<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Z-HALF-LIFE: 2 | Loading</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@300;400;700&family=Roboto:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    /* Reset & Basis */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { 
        width: 100%; 
        height: 100%; 
        overflow: hidden; 
        background: #000; 
        font-family: 'Roboto Condensed', Arial, sans-serif; 
    }

    /* ── Hintergrundbild ────────────────── */
    #background { 
        position: absolute; 
        top: 0; left: 0; right: 0; bottom: 0;
        background-image: url('assets/picture1.png');
        background-size: cover; 
        background-position: center;
        background-repeat: no-repeat;
        z-index: 1; 
    }
    
    /* Dunkles Overlay für besseren Kontrast */
    #overlay { 
        position: absolute; 
        top: 0; left: 0; right: 0; bottom: 0;
        background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.7) 100%);
        z-index: 2;
    }

    /* ── VHS / Scanline Effekt (Punkte/Streifen) ────────────────── */
    #scanlines {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background: linear-gradient(to bottom, transparent 50%, rgba(0, 0, 0, 0.35) 51%);
        background-size: 100% 4px;
        z-index: 3;
        pointer-events: none;
    }

    /* ── Info Panel (Jetzt Unten!) ────────────────── */
    #info-panel {
      position: absolute;
      bottom: 8%; /* Position nach unten gesetzt */
      left: 60px;
      z-index: 10;
      color: #fff;
      text-transform: uppercase;
      opacity: 0;
      transform: translateX(-30px);
      transition: all 1.2s ease-out;
      max-width: 600px; 
    }
    #info-panel.visible { opacity: 1; transform: translateX(0); }

    #info-panel h1 { 
        font-size: 72px; 
        font-weight: 700; 
        line-height: 0.9; 
        letter-spacing: -2px; 
        text-shadow: 2px 2px 15px rgba(0,0,0,0.7);
        margin-bottom: 20px;
    }
    
    /* Blaue Akzentfarbe */
    #info-panel h1 span { color: #00aaff; } 
    
    #info-panel p { 
        font-size: 18px; 
        font-weight: 300; 
        color: #ddd; 
        letter-spacing: 1px;
        text-shadow: 1px 1px 8px rgba(0,0,0,0.8);
        text-transform: none;
        line-height: 1.6;
        background: rgba(0, 0, 0, 0.4);
        padding: 15px;
        border-left: 4px solid #00aaff; /* Blauer Rand */
    }
  </style>
</head>
<body>

  <audio id="bg-music" loop></audio>

  <!-- Hintergrund und Effekte -->
  <div id="background"></div>
  <div id="overlay"></div>
  <div id="scanlines"></div> <!-- Die VHS Linien -->

  <!-- Infobox -->
  <div id="info-panel">
    <h1>Z-HALF-LIFE:<br><span>2 ROLEPLAY</span></h1>
    <p>
      A high-quality HL2RP server based on Z-City with a lot of custom features, a custom framework, and much more!
      We use only high-quality models and strive to provide the best RP experience possible!
      Trust me, the loading time will be worth it...
    </p>
  </div>

  <script>
    /* ==========================================================
       AUDIO & GMOD LOGIK
       ========================================================== */
    var audioFiles = ['assets/theme1.ogg'];
    var audio = document.getElementById('bg-music');
    
    // Song auswählen
    audio.src = audioFiles[0];
    audio.volume = 0.3; // Standard-Lautstärke

    // Abspiel-Funktion
    function tryPlayMusic() {
      var promise = audio.play();
      if (promise !== undefined) {
          promise.catch(function(e) { 
            console.log("Warte auf GMod Interaktion für Audio..."); 
          });
      }
    }

    // Wenn die Seite geladen ist
    window.onload = function() {
      setTimeout(function(){
        document.getElementById('info-panel').classList.add('visible');
        tryPlayMusic();
      }, 500);
    };

    // Offizielle GMod Lade-Funktion
    function GameDetails( servername, serverurl, mapname, maxplayers, steamid, gamemode, volume, language ) {
        if (volume !== undefined && volume > 0) {
            audio.volume = volume;
        } else if (volume === 0) {
            audio.volume = 0; // Spieler hat Musik stummgeschaltet
        }
        tryPlayMusic();
    }

    // GMod spezifische Funktion
    function SetStatusChanged( status ) {
        tryPlayMusic(); 
    }

    // Erzwinge Musikstart (GMod Fix)
    var forcePlayInterval = setInterval(function() {
        if (!audio.paused) {
            clearInterval(forcePlayInterval);
        } else {
            tryPlayMusic();
        }
    }, 1000);
  </script>
</body>
</html>
