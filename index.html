<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HL2RP | Loading</title>
  <!-- Lade moderne, technische Schriftarten -->
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    /* Reset & Basis */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { 
        width: 100%; 
        height: 100%; 
        overflow: hidden; 
        background-color: #020813; /* Dunkles Blau-Schwarz als Fallback */
        font-family: 'Chakra Petch', sans-serif; 
    }

    /* ── Hintergrundbild (1 Bild) ────────────────── */
    #background { 
        position: absolute; 
        top: 0; left: 0; right: 0; bottom: 0;
        /* HIER IST DEIN BILD: Achte darauf, dass der Pfad stimmt! */
        background-image: url('assets/picture1.png');
        background-size: cover; 
        background-position: center;
        background-repeat: no-repeat;
        z-index: 1; 
    }
    
    /* Dunkles Gradient-Overlay für bessere Lesbarkeit */
    #overlay-gradient { 
        position: absolute; 
        top: 0; left: 0; right: 0; bottom: 0;
        background: radial-gradient(circle at 70% 50%, rgba(2, 10, 25, 0.2) 0%, rgba(2, 10, 25, 0.85) 100%);
        z-index: 2;
    }

    /* Feines High-Tech Raster (Grid) über dem Bild */
    #grid-overlay {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background-image: 
            linear-gradient(rgba(0, 150, 255, 0.05) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0, 150, 255, 0.05) 1px, transparent 1px);
        background-size: 40px 40px;
        z-index: 3;
        pointer-events: none;
    }

    /* ── Glas-Panel (Modern & Krass) ────────────────── */
    #info-panel {
      position: absolute;
      bottom: 10%;
      left: 5%;
      z-index: 10;
      width: 650px;
      /* Milchglas-Effekt (Glassmorphism) */
      background: rgba(5, 15, 30, 0.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      /* Blaue Ränder */
      border: 1px solid rgba(0, 170, 255, 0.2);
      border-left: 5px solid #00aaff;
      padding: 40px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.6), inset 0 0 20px rgba(0, 170, 255, 0.05);
      
      /* Animation von Links */
      opacity: 0;
      transform: translateX(-50px);
      transition: all 1.5s cubic-bezier(0.16, 1, 0.3, 1);
    }
    #info-panel.visible { 
        opacity: 1; 
        transform: translateX(0); 
    }

    /* Überschrift in Weiß und strahlendem Blau */
    #info-panel h1 { 
        font-family: 'Rajdhani', sans-serif;
        font-size: 65px; 
        font-weight: 700; 
        line-height: 0.9; 
        letter-spacing: 3px; 
        color: #ffffff;
        text-transform: uppercase;
        margin-bottom: 25px;
        text-shadow: 0 0 15px rgba(255,255,255,0.2);
    }
    #info-panel h1 span { 
        color: #00aaff; /* Blau */
        text-shadow: 0 0 20px rgba(0, 170, 255, 0.6);
    } 
    
    /* Textbeschreibung */
    #info-panel p { 
        font-size: 16px; 
        font-weight: 400; 
        color: #c4d7ec; /* Leicht bläuliches Weiß */
        letter-spacing: 1px;
        line-height: 1.7;
        margin-bottom: 30px;
    }

    /* ── Animierter Ladebalken ────────────────── */
    .loading-section {
        width: 100%;
    }
    .loading-text {
        font-family: 'Rajdhani', sans-serif;
        font-size: 15px;
        color: #00aaff;
        letter-spacing: 4px;
        font-weight: 600;
        margin-bottom: 10px;
        text-transform: uppercase;
    }
    .progress-bar-bg {
        width: 100%;
        height: 4px;
        background: rgba(255, 255, 255, 0.1);
        position: relative;
        overflow: hidden;
        border-radius: 2px;
    }
    .progress-bar-fill {
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        width: 30%;
        background: #00aaff;
        box-shadow: 0 0 15px #00aaff, 0 0 5px #ffffff;
        /* Ping-Pong Animation für den Ladebalken */
        animation: loadingAnim 2.5s infinite ease-in-out;
    }

    @keyframes loadingAnim {
        0% { left: -30%; width: 30%; }
        50% { width: 50%; }
        100% { left: 100%; width: 30%; }
    }
  </style>
</head>
<body>

  <!-- Audio Element -->
  <audio id="bg-music" loop></audio>

  <!-- 1. Der Hintergrund (Bild) -->
  <div id="background"></div>

  <!-- 2. Die visuellen Overlays (Gradient & Raster) -->
  <div id="overlay-gradient"></div>
  <div id="grid-overlay"></div>

  <!-- 3. Das moderne Glas-Panel -->
  <div id="info-panel">
    <h1>Z-HALF-LIFE:<br><span>2 ROLEPLAY</span></h1>
    <p>
      A high-quality HL2RP server based on Z-City with a lot of custom features, a custom framework, and much more!
      We use only high-quality models and strive to provide the best RP experience possible!
      Trust me, the loading time will be worth it...
    </p>
    
    <!-- Ladebalken Bereich -->
    <div class="loading-section">
        <div class="loading-text">Establishing Connection...</div>
        <div class="progress-bar-bg">
            <div class="progress-bar-fill"></div>
        </div>
    </div>
  </div>

  <script>
    /* ==========================================================
       AUDIO & GMOD LOGIK
       ========================================================== */
    var audioFiles = ['assets/theme1.ogg'];
    var audio = document.getElementById('bg-music');
    
    // Song auswählen (WICHTIG: Prüfe ob assets/theme1.ogg existiert!)
    audio.src = audioFiles[0];
    audio.volume = 0.3; // Lautstärke (0.0 bis 1.0)

    function tryPlayMusic() {
      var promise = audio.play();
      if (promise !== undefined) {
          promise.catch(function(e) { 
            console.log("Warte auf GMod Interaktion für Audio..."); 
          });
      }
    }

    // Beim Laden der Seite: Panel reinsliden lassen und Musik starten
    window.onload = function() {
      setTimeout(function(){
        document.getElementById('info-panel').classList.add('visible');
        tryPlayMusic();
      }, 300);
    };

    // Offizielle GMod Lade-Funktion
    function GameDetails( servername, serverurl, mapname, maxplayers, steamid, gamemode, volume, language ) {
        if (volume !== undefined && volume > 0) {
            audio.volume = volume;
        } else if (volume === 0) {
            audio.volume = 0; // Stummgeschaltet
        }
        tryPlayMusic();
    }

    // Wenn GMod den Status ändert
    function SetStatusChanged( status ) {
        // Hier könnte man den Text "Establishing Connection..." per JS ändern (optional)
        document.querySelector('.loading-text').innerText = status;
        tryPlayMusic(); 
    }

    // Fallback: Erzwinge Musikstart
    var forcePlayInterval = setInterval(function() {
        if (!audio.paused) {
            clearInterval(forcePlayInterval);
        } else {
            tryPlayMusic();
        }
    }, 1000);
  </script>
</body>
</html>
