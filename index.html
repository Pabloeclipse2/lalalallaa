<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HL2RP | Loading</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Roboto+Condensed:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    /* Reset & Basis */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { 
        width: 100%; 
        height: 100%; 
        overflow: hidden; 
        background: #050505; 
        font-family: 'Roboto Condensed', Arial, sans-serif; 
    }

    /* ── Hintergrundbild (Statisch, nur 1 Bild) ────────────────── */
    #background { 
        position: absolute; 
        top: 0; left: 0; right: 0; bottom: 0;
        background-image: url('assets/picture1.png');
        background-size: cover; 
        background-position: center;
        background-repeat: no-repeat;
        z-index: 1; 
    }
    
    /* Düsteres HL2-Overlay (Vignette) */
    #overlay { 
        position: absolute; 
        top: 0; left: 0; right: 0; bottom: 0;
        background: linear-gradient(135deg, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.85) 100%);
        z-index: 2;
    }

    /* Terminal Scanlines für das "krassere" Feeling */
    #scanlines {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2));
        background-size: 100% 4px;
        z-index: 3;
        pointer-events: none;
    }

    /* ── Info Panel ────────────────── */
    #info-panel {
      position: absolute;
      bottom: 8%;
      left: 5%;
      z-index: 10;
      color: #fff;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(30px);
      transition: all 1.2s ease-out;
      max-width: 650px; 
    }
    #info-panel.visible { opacity: 1; transform: translateY(0); }

    /* Überschrift mit typischem HL2-Orange */
    #info-panel h1 { 
        font-family: 'Rajdhani', sans-serif;
        font-size: 68px; 
        font-weight: 700; 
        line-height: 0.9; 
        letter-spacing: 2px; 
        text-shadow: 2px 2px 15px rgba(0,0,0,0.9);
        margin-bottom: 15px;
        border-bottom: 2px solid #f37925;
        padding-bottom: 10px;
        display: inline-block;
    }
    /* Das Orange aus dem Half-Life Logo */
    #info-panel h1 span { color: #f37925; } 
    
    #info-panel p { 
        font-size: 18px; 
        font-weight: 300; 
        color: #d1d1d1; 
        letter-spacing: 1px;
        text-shadow: 1px 1px 8px rgba(0,0,0,0.9);
        text-transform: none;
        line-height: 1.6;
        background: rgba(10, 10, 10, 0.7);
        padding: 20px;
        border-left: 4px solid #f37925;
        box-shadow: 0px 5px 15px rgba(0,0,0,0.5);
    }

    /* Blinkender Status-Text */
    .loading-status {
        margin-top: 15px;
        font-family: 'Rajdhani', sans-serif;
        font-size: 16px;
        color: #f37925;
        letter-spacing: 3px;
        font-weight: bold;
        animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
        0% { opacity: 0.3; }
        50% { opacity: 1; }
        100% { opacity: 0.3; }
    }
  </style>
</head>
<body>

  <audio id="bg-music" loop></audio>

  <!-- Das einzige Bild -->
  <div id="background"></div>

  <!-- Visuelle Effekte -->
  <div id="overlay"></div>
  <div id="scanlines"></div>

  <!-- Textbereich -->
  <div id="info-panel">
    <h1>FRONTLINES<br><span>WARFARE</span></h1>
    <p>
      A high-quality HL2RP server based on Z-City with a lot of custom features, a custom framework, and much more!
      We use only high-quality models and strive to provide the best RP experience possible!
      Trust me, the loading time will be worth it...
    </p>
    <div class="loading-status">ESTABLISHING CONNECTION...</div>
  </div>

  <script>
    /* ==========================================================
       AUDIO & GMOD LOGIK
       ========================================================== */
    var audioFiles = ['assets/theme1.ogg'];
    var audio = document.getElementById('bg-music');
    
    // Zufälligen Song auswählen (falls in Zukunft mehr in den Ordner kommen)
    var randomSong = audioFiles[Math.floor(Math.random() * audioFiles.length)];
    audio.src = randomSong;
    audio.volume = 0.3; // Standard-Lautstärke

    // Abspiel-Funktion
    function tryPlayMusic() {
      var promise = audio.play();
      if (promise !== undefined) {
          promise.catch(function(e) { 
            console.log("Autoplay von Browser blockiert - warte auf GMod Event"); 
          });
      }
    }

    // Wenn die Seite geladen ist
    window.onload = function() {
      setTimeout(function(){
        document.getElementById('info-panel').classList.add('visible');
        tryPlayMusic();
      }, 500); // Leicht verzögertes Einblenden für cooleren Effekt
    };

    // GMod Standard-Funktion: Wird von GMod beim Laden offiziell aufgerufen!
    function GameDetails( servername, serverurl, mapname, maxplayers, steamid, gamemode, volume, language ) {
        if (volume !== undefined && volume > 0) {
            audio.volume = volume;
        } else if (volume === 0) {
            audio.volume = 0; // Spieler hat Musik stummgeschaltet
        }
        tryPlayMusic();
    }

    // GMod spezifische Funktion: Startet Musik bei Statusänderung
    function SetStatusChanged( status ) {
        tryPlayMusic(); 
    }

    // Hardcore-Fix: Versucht Musik zu starten, bis GMod den Block aufhebt
    var forcePlayInterval = setInterval(function() {
        if (!audio.paused) {
            clearInterval(forcePlayInterval);
        } else {
            tryPlayMusic();
        }
    }, 1000);
  </script>
</body>
</html>
